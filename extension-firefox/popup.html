<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drunk Walker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 280px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: rgba(30, 30, 32, 0.98);
      color: #e8eaed;
    }
    .header {
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.2) 0%, rgba(0, 170, 0, 0.1) 100%);
      border-bottom: 1px solid rgba(0, 255, 0, 0.3);
      padding: 12px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 1.2em;
      color: #0f0;
    }
    .header .version {
      font-size: 0.7em;
      opacity: 0.7;
      margin-top: 4px;
      color: #888;
    }
    .content {
      padding: 12px;
    }
    .stats-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .stat-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      padding: 8px;
      text-align: center;
    }
    .stat-label {
      font-size: 7px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 500;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-top: 2px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 11px;
    }
    .status-label {
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-value {
      font-weight: 600;
    }
    .status-value.running { color: #4caf50; }
    .status-value.stopped { color: #ff9800; }
    .btn {
      width: 100%;
      padding: 10px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.1s;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-primary {
      background: rgba(255, 255, 255, 0.08);
      color: #e8eaed;
    }
    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.12);
    }
    .btn-primary:active {
      background: rgba(255, 255, 255, 0.15);
    }
    .btn-primary.running {
      background: rgba(255, 80, 80, 0.2);
      color: #ff8a80;
      border-color: rgba(255, 80, 80, 0.4);
    }
    .btn-group {
      display: flex;
      gap: 6px;
    }
    .btn-group .btn {
      flex: 1;
      font-size: 10px;
      padding: 8px;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #e8eaed;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .instructions {
      background: rgba(0, 255, 0, 0.05);
      border-left: 3px solid rgba(0, 255, 0, 0.3);
      padding: 8px;
      font-size: 10px;
      line-height: 1.4;
      margin-top: 10px;
    }
    .instructions strong {
      display: block;
      margin-bottom: 4px;
      color: #0f0;
    }
    .instructions ol {
      margin: 0;
      padding-left: 16px;
    }
    .instructions li {
      margin-bottom: 3px;
    }
    .message {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      font-weight: 600;
      display: none;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .message.success {
      background: rgba(76, 175, 80, 0.2);
      color: #81c784;
      display: block;
    }
    .message.error {
      background: rgba(244, 67, 54, 0.2);
      color: #e57373;
      display: block;
    }
    .not-on-maps {
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid rgba(255, 170, 0, 0.3);
      color: #ffb74d;
      padding: 10px;
      border-radius: 4px;
      font-size: 10px;
      text-align: center;
      margin-bottom: 10px;
    }
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 9px;
      opacity: 0.5;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 10px;
    }
    .footer a {
      color: #0f0;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤪 DRUNK WALKER</h1>
    <div class="version">v6.1.4 - PLEDGE Explorer</div>
  </div>

  <div class="content">
    <div id="statusContainer">
      <div class="loading">⏳ Checking Street View...</div>
    </div>

    <div id="message" class="message"></div>

    <div class="footer">
      <a href="https://genaforvena.github.io/drunk-walker/" target="_blank">GitHub Pages</a> •
      <a href="https://github.com/genaforvena/drunk-walker" target="_blank">Source</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
