<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aa00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  
  <!-- Drunk walker face -->
  <circle cx="64" cy="58" r="28" fill="#000"/>
  
  <!-- Eyes (swirly/drunk) -->
  <g fill="#0f0">
    <!-- Left eye (swirl) -->
    <circle cx="54" cy="52" r="8"/>
    <circle cx="54" cy="52" r="4" fill="#000"/>
    
    <!-- Right eye (swirl) -->
    <circle cx="74" cy="52" r="8"/>
    <circle cx="74" cy="52" r="4" fill="#000"/>
  </g>
  
  <!-- Mouth (wavy) -->
  <path d="M 48 72 Q 56 68 64 72 Q 72 76 80 72" stroke="#0f0" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Path trail behind -->
  <path d="M 20 90 Q 35 85 45 95 Q 55 105 65 100" stroke="#0f0" stroke-width="3" fill="none" opacity="0.6" stroke-dasharray="5,3"/>
  
  <!-- Arrow indicating movement -->
  <polygon points="90,100 105,95 90,90" fill="#0f0"/>
</svg>
