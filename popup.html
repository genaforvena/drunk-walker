<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drunk Walker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 10px;
      margin: 0;
      background: #f4f4f4;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 16px;
      margin: 0;
    }
    .input-group {
      margin-bottom: 10px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 2px;
      color: #666;
    }
    .input-group input[type="text"],
    .input-group input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .slider-group {
      margin-bottom: 10px;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }
    .slider-group input {
      width: 100%;
    }
    .controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .controls button {
      flex: 1;
      padding: 8px;
      margin: 0 2px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }
    #btn-stop { background: #ff4d4d; color: white; }
    #btn-start { background: #4caf50; color: white; }
    #btn-pause { background: #ff9800; color: white; }
    
    .status-panel {
      background: white;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 11px;
    }
    .status-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .status-label { font-weight: bold; color: #555; }
    .warning {
      color: #d32f2f;
      font-size: 11px;
      margin-bottom: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Drunk Walker</h1>
    <span style="font-size: 10px; color: #999;">v1.0.0</span>
  </div>

  <div id="fs-warning" class="warning">
    ⚠️ Full-screen mode (F11) recommended!
  </div>

  <div class="slider-group">
    <label for="click-interval">Click Interval: <span id="interval-val">3.0</span>s</label>
    <input type="range" id="click-interval" min="1" max="10" step="0.5" value="3">
  </div>

  <div class="slider-group">
    <label for="click-radius">Click Radius: <span id="radius-val">50</span>px</label>
    <input type="range" id="click-radius" min="10" max="100" step="5" value="50">
  </div>

  <div class="input-group">
    <label for="max-steps">Max Steps</label>
    <input type="number" id="max-steps" value="1000" min="1" max="10000">
  </div>

  <div class="controls">
    <button id="btn-stop">🔴 STOP</button>
    <button id="btn-start">▶ START</button>
    <button id="btn-pause">⏸ PAUSE</button>
  </div>

  <div class="controls">
    <button id="btn-yolo" style="background: #9c27b0; color: white; font-style: italic;">🤪 YOLO MODE</button>
  </div>

  <div class="status-panel">
    <div class="status-line">
      <span class="status-label">Status:</span>
      <span id="status-text">Idle</span>
    </div>
    <div class="status-line">
      <span class="status-label">Progress:</span>
      <span id="progress-text">0 / 0 steps</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
