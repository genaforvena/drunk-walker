name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Build bookmarklet
      run: npm run build
    
    - name: Verify build output
      run: |
        test -f bookmarklet.js
        echo "✓ bookmarklet.js exists"
        grep -q "DRUNK WALKER" bookmarklet.js
        echo "✓ bookmarklet.js contains expected content"
